name: Backfill Statcast
on:
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year'
        required: false
        default: '2015'
      end_year:
        description: 'End year'
        required: false
        default: '2026'
      reset_pitchers:
        description: 'Reset pitcher checkpoint (re-fetch all pitchers)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      reset_batters:
        description: 'Reset batter checkpoint (re-fetch all batters)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      pitchers_only:
        description: 'Skip batter backfill'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      batters_only:
        description: 'Skip pitcher backfill'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  backfill:
    runs-on: self-hosted
    timeout-minutes: 360  # 6 hours max
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3.11 -m pip install -r requirements.txt

      - name: Build backfill args
        id: args
        run: |
          ARGS=""
          [ "${{ github.event.inputs.reset_pitchers }}" = "true" ] && ARGS="$ARGS --reset-pitchers"
          [ "${{ github.event.inputs.reset_batters }}"  = "true" ] && ARGS="$ARGS --reset-batters"
          [ "${{ github.event.inputs.pitchers_only }}"  = "true" ] && ARGS="$ARGS --pitchers-only"
          [ "${{ github.event.inputs.batters_only }}"   = "true" ] && ARGS="$ARGS --batters-only"
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run backfill
        run: python3.11 jobs/backfill_statcast.py ${{ steps.args.outputs.args }}
        env:
          SNOWFLAKE_ACCOUNT:      ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:         ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY:  ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_DATABASE:     ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE:    ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE:         ${{ secrets.SNOWFLAKE_ROLE }}
          START_YEAR:             ${{ github.event.inputs.start_year }}
          END_YEAR:               ${{ github.event.inputs.end_year }}