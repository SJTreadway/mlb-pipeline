# .github/workflows/daily_ingest.yml
name: Daily Statcast Ingest
on:
  workflow_dispatch:
    inputs:
      refresh_data:
        description: 'Fetch new data from Statcast API (set false for 2nd/3rd runs)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 15 * * *'   # 10am CT (first run, always refresh)
    - cron: '0 17 * * *'   # 12pm CT
    - cron: '0 22 * * *'   # 5pm CT

jobs:
  ingest:
    runs-on: self-hosted
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3.11 -m pip install -r requirements.txt

      - name: Set refresh flag
        id: refresh
        run: |
          INPUT="${{ github.event.inputs.refresh_data }}"
          if [ -n "$INPUT" ]; then
            echo "refresh=$INPUT" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "15" ]; then
              echo "refresh=1" >> $GITHUB_OUTPUT
            else
              echo "refresh=0" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run daily statcast ingestion
        run: python3.11 jobs/daily_statcast_ingest.py
        env:
          REFRESH_DATA:           ${{ github.event.inputs.refresh_data || 0 }}
          SNOWFLAKE_ACCOUNT:      ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:         ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY:  ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_DATABASE:     ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE:    ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE:         ${{ secrets.SNOWFLAKE_ROLE }}
          YEAR:                   2026